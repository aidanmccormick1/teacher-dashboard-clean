services:
  - type: web
    name: teacheros-api
    runtime: node
    rootDir: .
    plan: starter
    region: ohio
    buildCommand: npm ci && npm run build
    startCommand: npm --workspace @teacheros/api run start
    healthCheckPath: /health/readiness
    envVars:
      - key: NODE_VERSION
        value: 20.10.0
      - key: API_PORT
        value: 3001
      - key: REQUEST_ID_HEADER
        value: x-request-id
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL_PARSE_SCHEDULE
        value: gpt-4o-mini
      - key: OPENAI_MODEL_GENERATE_SEGMENTS
        value: gpt-4o
      - key: OPENAI_MODEL_CONTINUITY
        value: gpt-4o
      - key: S3_REGION
        value: us-east-1
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: teacheros-worker
    runtime: node
    rootDir: .
    region: ohio
    buildCommand: npm ci && npm run build
    startCommand: npm --workspace @teacheros/worker run start
    envVars:
      - key: NODE_VERSION
        value: 20.10.0
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
