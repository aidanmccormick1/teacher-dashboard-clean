services:
  - type: web
    name: teacheros-api
    runtime: node
    rootDir: .
    plan: free
    region: ohio
    branch: main
    buildCommand: npm ci --include=dev && npm --workspace @teacheros/contracts run build && npm --workspace @teacheros/db run build && npm --workspace @teacheros/ai-worker run build && npm --workspace @teacheros/api run build
    startCommand: npm --workspace @teacheros/db run db:migrate && npm --workspace @teacheros/api run start
    healthCheckPath: /health/readiness
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20.10.0
      - key: NODE_ENV
        value: production
      - key: ENABLE_API_DOCS
        value: false
      - key: REQUEST_ID_HEADER
        value: x-request-id
      - key: CLERK_AUTHORIZED_PARTIES
        value: https://teacher-dashboard-clean.pages.dev,http://localhost:5173,http://127.0.0.1:5173
      - key: CLERK_JWT_KEY
        value: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA5eX3zK/SkRroDRqnGyTk
          UZH7GaOJS3OIS1jXxwjZibV3IZoNTUsp6Nv3PdO4eS1gnCwmoj9K1huq32oUf844
          jIrjsM2HPHclmnlSw/vRcNA/XrNJ0iNUVYzCUjWplo77IyotHSQzY1hcSB7BOSLz
          AdtfhNOmDM5T0nu4Sx/UVxC8ngrvVbN81kzslP4R+JIZvDgkZpU0XRoAaYAXsUA7
          UBWWJSk6XxQa5Ycv8W+8gGfdoYn9VFqQOSYYq3B3TQxi66qPBua+5t+9HWGmnoR7
          Vaqef7Zss7xhqRE1N7Cz/GjNkWQq4tYY2IT+EwwkZ8s8DvBUcUQEHLRaUTFkzXjF
          uwIDAQAB
          -----END PUBLIC KEY-----
      - key: CLERK_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: teacheros-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: teacheros-redis
          property: connectionString
      - key: OPENAI_MODEL_PARSE_SCHEDULE
        value: gpt-4o-mini
      - key: OPENAI_MODEL_GENERATE_SEGMENTS
        value: gpt-4o
      - key: OPENAI_MODEL_CONTINUITY
        value: gpt-4o
      - key: OPENAI_API_KEY
        sync: false
      - key: RUN_EMBEDDED_AI_WORKER
        value: true
      - key: S3_REGION
        value: us-east-1
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: keyvalue
    name: teacheros-redis
    plan: free
    region: ohio
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: teacheros-db
    plan: free
    region: ohio
    databaseName: teacheros
    user: teacheros
    postgresMajorVersion: "17"
    ipAllowList: []
